services:
  db:
    image: postgres:16-alpine
    container_name: neonova-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-neonova}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-neonova_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-neonova}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-neonova}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - neonova-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: neonova-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-neonova}:${POSTGRES_PASSWORD:-neonova_dev_password}@db:5432/${POSTGRES_DB:-neonova}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ALGORITHM: ${ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_DEPLOYMENT_NAME: ${AZURE_OPENAI_DEPLOYMENT_NAME:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      CORS_ALLOW_ORIGINS: http://localhost:3000,http://frontend:3000
      PYTHONPATH: /app/src
    ports:
      - "8000:8000"
    networks:
      - neonova-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: neonova-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - neonova-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
    driver: local

networks:
  neonova-network:
    driver: bridge
